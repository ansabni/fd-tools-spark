# ─────────────────────────────────────────────────────────────────────────────
# FDS Tools — FDPipelineJob (mix_maprule)
#
# Reads stdtime.* files from S3 (output of fd-compute-spark-June), applies
# mix_maprule C++ logic via JNI, and uploads the result back to S3.
#
# All S3 paths are supplied via MIX_MAPRULE_* env vars (same convention as
# the standalone mix_maprule binary).
#
# Do NOT apply this file directly — use deploy/run-pipeline.sh which
# substitutes all <PLACEHOLDER> values first.
# ─────────────────────────────────────────────────────────────────────────────

# ── S3 credentials ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-tools-creds
  namespace: spark-operator
stringData:
  access-key: "<S3_ACCESS_KEY>"
  secret-key: "<S3_SECRET_KEY>"

---

# ── SSE-C encryption keys JSON ────────────────────────────────────────────────
# Format: {"1":"<base64-AES-key>","2":"<base64-AES-key>"}
# Input files carry their key index in the filename (.keyN suffix).
# Output is encrypted with the key at S3_OUTPUT_KEY_INDEX.
apiVersion: v1
kind: Secret
metadata:
  name: fds-tools-enc-keys
  namespace: spark-operator
stringData:
  encryption-keys.json: '$ENCRYPTION_KEYS_JSON'

---

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fds-tools-pipeline
  namespace: spark-operator

spec:
  type: Scala
  mode: cluster
  # JAR compiled against Spark 4.1.1 / Scala 2.13 — requires a Spark 4.x image.
  # Verify the exact tag on Docker Hub and update if needed.
  image: "apache/spark:4.0.0-scala2.13-java17-ubuntu"
  imagePullPolicy: IfNotPresent

  mainClass: com.fd.FDPipelineJob
  # Upload target/scala-2.13/fd-spark_2.13-0.1.jar to object storage and set the URL here.
  mainApplicationFile: "https://fds-jar.in-maa-1.linodeobjects.com/fd_tools_jar/perMapPerConfig/fd-tools-spark-assembly.jar"
  sparkVersion: "4.0.0"

  restartPolicy:
    type: Never

  # hadoop-aws + AWS SDK are not bundled in the apache/spark:4.x image.
  # These two JARs add the S3AFileSystem implementation at runtime.
  deps:
    jars:
      - "https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar"
      - "https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar"

  hadoopConf:
    "fs.s3a.impl":                "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.path.style.access":   "true"
    "fs.s3a.signing-algorithm":   "S3SignerType"
    "fs.s3a.checksum.validation": "false"
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.endpoint":            "us-ord-10.linodeobjects.com"

  sparkConf:
    "spark.serializer":                 "org.apache.spark.serializer.KryoSerializer"
    "spark.network.timeout":            "800s"
    "spark.executor.heartbeatInterval": "60s"
    "spark.kryoserializer.buffer.max":  "512m"
    "spark.jars.ivy":                   "/tmp/.ivy2"
    "spark.driver.extraJavaOptions":    "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"
    "spark.executor.extraJavaOptions":  "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"

    # ── S3 credentials injected from the Secret ───────────────────────────────
    "spark.kubernetes.driver.secretKeyRef.S3_ACCESS_KEY":   "fds-tools-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_SECRET_KEY":   "fds-tools-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_ACCESS_KEY": "fds-tools-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_SECRET_KEY": "fds-tools-creds:secret-key"

    # ── MIX_MAPRULE_* env vars ────────────────────────────────────────────────
    # Driver reads these to discover S3 files, downloads config, and broadcasts.
    # Executor copies arrive via broadcast, but we set them here for consistency.
    "spark.kubernetes.driverEnv.MIX_MAPRULE_IDIR":               "<MIX_MAPRULE_IDIR>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_ODIR":               "<MIX_MAPRULE_ODIR>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_CONFIG":             "<MIX_MAPRULE_CONFIG>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_SUFFIX":             "<MIX_MAPRULE_SUFFIX>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_THINNING_PCT_JUMP":  "<MIX_MAPRULE_THINNING_PCT_JUMP>"
    "spark.executorEnv.MIX_MAPRULE_IDIR":                        "<MIX_MAPRULE_IDIR>"
    "spark.executorEnv.MIX_MAPRULE_ODIR":                        "<MIX_MAPRULE_ODIR>"
    "spark.executorEnv.MIX_MAPRULE_CONFIG":                      "<MIX_MAPRULE_CONFIG>"
    "spark.executorEnv.MIX_MAPRULE_SUFFIX":                      "<MIX_MAPRULE_SUFFIX>"
    "spark.executorEnv.MIX_MAPRULE_THINNING_PCT_JUMP":           "<MIX_MAPRULE_THINNING_PCT_JUMP>"

    # Keep executor pods after completion so logs can be retrieved
    "spark.kubernetes.executor.deleteOnTermination": "false"

  # ── Positional args ──────────────────────────────────────────────────────────
  # [0] s3Bucket          — bucket name
  # [1] encryptionKeysFile— path to the mounted JSON key file
  arguments:
    - "<S3_BUCKET>"
    - "/mnt/encryption-keys/encryption-keys.json"

  # ── Driver ───────────────────────────────────────────────────────────────────
  driver:
    cores: 2
    memory: "4g"
    serviceAccount: spark
    labels:
      app: fds-tools
      component: driver
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
    secrets:
      - name: fds-tools-enc-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185

  # ── Executors ────────────────────────────────────────────────────────────────
  executor:
    cores: 4
    instances: 1
    memory: "8g"
    memoryOverhead: "2g"
    labels:
      app: fds-tools
      component: executor
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
    secrets:
      - name: fds-tools-enc-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185
