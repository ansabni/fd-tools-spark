# ─────────────────────────────────────────────────────────────────────────────
# FDS Tools — FDPipelineJob (mix_maprule) — PER_MAP_PER_CONFIG mode
#
# Generates AddFD configs at runtime from the customer map file.
# No pre-uploaded config files needed — set CUSTOMER_MAP_S3_KEY instead.
#
# JAR: fd_tools_jar/perMapPerConfig/fd-tools-spark-assembly.jar
#      (Scala 2.12 / Spark 3.5.0)
#
# Do NOT apply this file directly — use deploy/run-addfd-permap-001.local.sh
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: fds-tools-creds
  namespace: spark-operator
stringData:
  access-key: "<S3_ACCESS_KEY>"
  secret-key: "<S3_SECRET_KEY>"

---

apiVersion: v1
kind: Secret
metadata:
  name: fds-tools-enc-keys
  namespace: spark-operator
stringData:
  encryption-keys.json: '$ENCRYPTION_KEYS_JSON'

---

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fds-tools-pipeline
  namespace: spark-operator

spec:
  type: Scala
  mode: cluster
  image: "apache/spark:4.0.0-scala2.13-java17-ubuntu"
  imagePullPolicy: IfNotPresent

  mainClass: com.fd.FDPipelineJob
  mainApplicationFile: "https://fds-jar.in-maa-1.linodeobjects.com/fd_tools_jar/perMapPerConfig/fd-tools-spark-assembly.jar"
  sparkVersion: "4.0.0"

  restartPolicy:
    type: Never

  deps:
    jars:
      - "https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar"
      - "https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar"

  hadoopConf:
    "fs.s3a.impl":                   "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.path.style.access":      "true"
    "fs.s3a.signing-algorithm":      "S3SignerType"
    "fs.s3a.checksum.validation":    "false"
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.endpoint":               "us-ord-10.linodeobjects.com"

  sparkConf:
    "spark.serializer":                 "org.apache.spark.serializer.KryoSerializer"
    "spark.network.timeout":            "800s"
    "spark.executor.heartbeatInterval": "60s"
    "spark.kryoserializer.buffer.max":  "512m"
    "spark.jars.ivy":                   "/tmp/.ivy2"
    "spark.driver.extraJavaOptions":    "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"
    "spark.executor.extraJavaOptions":  "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"

    "spark.kubernetes.driver.secretKeyRef.S3_ACCESS_KEY":   "fds-tools-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_SECRET_KEY":   "fds-tools-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_ACCESS_KEY": "fds-tools-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_SECRET_KEY": "fds-tools-creds:secret-key"

    # ── PER_MAP_PER_CONFIG mode ───────────────────────────────────────────────
    "spark.kubernetes.driverEnv.PER_MAP_PER_CONFIG":   "true"
    "spark.kubernetes.driverEnv.CUSTOMER_MAP_S3_KEY":  "<CUSTOMER_MAP_S3_KEY>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_IDIR":    "<MIX_MAPRULE_IDIR>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_ODIR":    "<MIX_MAPRULE_ODIR>"
    "spark.kubernetes.driverEnv.MIX_MAPRULE_THINNING_PCT_JUMP": "<MIX_MAPRULE_THINNING_PCT_JUMP>"
    "spark.executorEnv.PER_MAP_PER_CONFIG":            "true"
    "spark.executorEnv.CUSTOMER_MAP_S3_KEY":           "<CUSTOMER_MAP_S3_KEY>"
    "spark.executorEnv.MIX_MAPRULE_IDIR":             "<MIX_MAPRULE_IDIR>"
    "spark.executorEnv.MIX_MAPRULE_ODIR":             "<MIX_MAPRULE_ODIR>"
    "spark.executorEnv.MIX_MAPRULE_THINNING_PCT_JUMP": "<MIX_MAPRULE_THINNING_PCT_JUMP>"

    "spark.kubernetes.executor.deleteOnTermination": "false"

  arguments:
    - "<S3_BUCKET>"
    - "/mnt/encryption-keys/encryption-keys.json"

  driver:
    cores: 2
    memory: "4g"
    serviceAccount: spark
    labels:
      app: fds-tools
      component: driver
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
    secrets:
      - name: fds-tools-enc-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185

  executor:
    cores: 4
    instances: 1
    memory: "8g"
    memoryOverhead: "2g"
    labels:
      app: fds-tools
      component: executor
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
    secrets:
      - name: fds-tools-enc-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185
